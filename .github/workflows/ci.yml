name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Run both platforms to completion — a macOS failure must not cancel Linux
      # (or vice versa). CrustCore runs on Linux and macOS; CI proves both.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Install the sandbox backend so the sandbox tests and the Phase 5 verify
      # loop exercise the *real* bubblewrap path (not just the refusal/gate path).
      # Ubuntu 24.04 restricts unprivileged user namespaces via AppArmor by
      # default; relax it best-effort so bwrap can set up its namespaces. The
      # tests degrade gracefully (gate-only) if bwrap is still non-functional.
      # macOS needs no install step — it uses the built-in /usr/bin/sandbox-exec
      # (Seatbelt) backend, so its live confinement tests run unconditionally.
      - name: Install bubblewrap (sandbox backend, Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          bwrap --unshare-all --ro-bind /usr /usr --ro-bind /bin /bin \
            --ro-bind /lib /lib --proc /proc --dev /dev /bin/true \
            && echo "bwrap functional" || echo "bwrap present but not functional (tests will gate-only)"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # The single source of truth for "done": fmt --check, clippy -D warnings,
      # the full test suite, the forbidden-dependency check for nano, and the
      # nano size gate (invariant 19). See xtask/ and CLAUDE.md §9.
      - name: cargo xtask verify
        run: cargo xtask verify

      # Track the all-capability-packs flagship binary size (crustcore --features full).
      # NOT the flagship claim (nano is); a tripwire catches a heavy live stack (Tokio/TLS/DB)
      # leaking into the convenience binary — those belong in spawned sidecars.
      - name: cargo xtask full-size
        run: cargo xtask full-size

      # Reportable size breakdown. Best-effort: needs network to install, and the
      # gate itself already ran in `verify`. Linux only — the flagship size claim
      # is the Linux nano binary.
      - name: cargo-bloat report (nano)
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          cargo install cargo-bloat --locked || true
          cargo bloat --profile nano -p crustcore --no-default-features --features nano --crates -n 30 || true
          cargo tree -p crustcore --no-default-features --features nano || true

  # Explicit, separately-visible nano size gate so the budget shows as its own
  # required check. It re-runs the same measurement xtask performs.
  nano-size-gate:
    name: nano size gate (<800kB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-nano-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-nano-
      - name: Build and measure crustcore-nano
        run: cargo xtask size-check
